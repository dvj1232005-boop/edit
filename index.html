<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Pro-Video Editor | Đăng Tùng</title>
    <style>
        :root {
            var(--bg-base): #000000;
            --surface-primary: #1C1C1E;
            --surface-secondary: #2C2C2E;
            --accent-color: #0A84FF;
            --accent-hover: #409CFF;
            --success-color: #32D74B;
            --text-primary: #FFFFFF;
            --text-secondary: #EBEBF599;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --glass-blur: blur(24px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: var(--text-primary);
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.5rem 2rem;
            text-align: center;
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.25rem; font-weight: 700; }
        .logo span { color: var(--accent-color); }

        main {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; padding-left: 0.5rem; }

        .card {
            background: var(--surface-primary);
            border-radius: var(--border-radius-lg);
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .upload-zone {
            background: var(--surface-secondary);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: var(--border-radius-md);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-zone:active { transform: scale(0.96); background: rgba(255,255,255,0.1); }
        .upload-zone.dragover { border-color: var(--accent-color); background: rgba(10, 132, 255, 0.1); }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
        .upload-text { font-size: 0.95rem; color: var(--text-secondary); font-weight: 500; }

        .settings-group { background: var(--surface-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .setting-item:last-child { border-bottom: none; }
        .setting-info h3 { font-size: 1.05rem; font-weight: 500; margin-bottom: 0.2rem; }
        .setting-info p { font-size: 0.8rem; color: var(--text-secondary); }

        .ios-switch { position: relative; display: inline-block; width: 51px; height: 31px; flex-shrink: 0; }
        .ios-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #39393D; transition: .3s; border-radius: 31px; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-primary { width: 100%; padding: 1.2rem; font-size: 1.1rem; font-weight: 600; color: #fff; background: var(--accent-color); border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; margin-top: 1.5rem; }
        .btn-primary:active { transform: scale(0.97); background: var(--accent-hover); }
        .btn-primary:disabled { background: #39393D; color: var(--text-secondary); cursor: not-allowed; transform: none; }

        .progress-container { display: none; margin-top: 1.5rem; background: var(--surface-secondary); padding: 1.2rem; border-radius: var(--border-radius-md); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 0.8rem; font-size: 0.9rem; font-weight: 500; }
        .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); border-radius: 3px; transition: width 0.3s ease-out; }

        .preview-section { display: none; opacity: 0; transition: opacity 0.5s ease; animation: slideUp 0.5s forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Vùng chứa file media thật của người dùng */
        .video-player {
            width: 100%;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            background: #000;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .video-player img, .video-player video {
            width: 100%;
            display: block;
            object-fit: contain;
            max-height: 500px;
        }

        .custom-audio-player {
            width: 100%;
            background: var(--surface-secondary);
            padding: 10px;
        }

        .btn-download { background: var(--text-primary); color: #000; }

        @media (max-width: 600px) { .upload-grid { grid-template-columns: 1fr; } main { padding: 1.5rem 1rem; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">AI<span>Pro</span>Editor</div>
    </header>

    <main>
        <div>
            <h2 class="section-title">Nguồn Dữ Liệu Của Bạn</h2>
            <div class="card upload-grid">
                <div class="upload-zone" id="media-upload">
                    <div class="upload-icon">🎞️</div>
                    <div class="upload-text" id="media-text">Thêm Video & Ảnh</div>
                    <input type="file" id="media-input" multiple accept="video/*, image/*" style="display: none;">
                </div>

                <div class="upload-zone" id="audio-upload">
                    <div class="upload-icon">🎵</div>
                    <div class="upload-text" id="audio-text">Thêm Nhạc Đích</div>
                    <input type="file" id="audio-input" accept="audio/*" style="display: none;">
                </div>
            </div>
        </div>

        <div>
            <h2 class="section-title">Cấu Hình AI</h2>
            <div class="settings-group">
                <div class="setting-item">
                    <div class="setting-info"><h3>Smart Beat-Sync</h3><p>Cắt cảnh tự động theo nhịp nhạc</p></div>
                    <label class="ios-switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="setting-item">
                    <div class="setting-info"><h3>Depth-Aware Text</h3><p>Chữ động hiển thị sau lưng chủ thể</p></div>
                    <label class="ios-switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
            </div>

            <button class="btn-primary" id="render-btn" onclick="startRender()">Tạo Video Tự Động</button>

            <div class="progress-container" id="progress-area">
                <div class="progress-header">
                    <span id="status-text">Đang phân tích dữ liệu...</span>
                    <span id="percent-text">0%</span>
                </div>
                <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
            </div>
        </div>

        <!-- PREVIEW SECTION SẼ HIỂN THỊ FILE THẬT -->
        <div id="preview-section" class="preview-section">
            <h2 class="section-title">Bản Xem Trước (Dữ Liệu Thật)</h2>
            <div class="video-player" id="dynamic-player">
                <!-- Javascript sẽ tự động nhét ảnh/video và nhạc của bạn vào đây -->
            </div>
            <button class="btn-primary btn-download" onclick="downloadVideo()">⬇ Lưu Video Về Máy</button>
        </div>

    </main>

    <script>
        const setupUploadZone = (zoneId, inputId, textId, defaultText) => {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            const textEl = document.getElementById(textId);

            zone.addEventListener('click', () => input.click());
            input.addEventListener('change', () => {
                if(input.files.length > 0) {
                    let videoCount = 0, imageCount = 0;
                    for(let file of input.files) {
                        if(file.type.startsWith('video/')) videoCount++;
                        if(file.type.startsWith('image/')) imageCount++;
                    }
                    let msg = [];
                    if(videoCount > 0) msg.push(`${videoCount} Video`);
                    if(imageCount > 0) msg.push(`${imageCount} Ảnh`);
                    if(input.id === 'audio-input') msg = [`1 File Âm Thanh`];

                    textEl.textContent = msg.join(' & ');
                    textEl.style.color = "var(--success-color)";
                } else {
                    textEl.textContent = defaultText;
                    textEl.style.color = "var(--text-secondary)";
                }
            });
        };

        setupUploadZone('media-upload', 'media-input', 'media-text', 'Thêm Video & Ảnh');
        setupUploadZone('audio-upload', 'audio-input', 'audio-text', 'Thêm Nhạc Đích');

        function startRender() {
            const mediaInput = document.getElementById('media-input');
            const audioInput = document.getElementById('audio-input');

            // Bắt lỗi nếu người dùng chưa chọn file thật
            if (mediaInput.files.length === 0 && audioInput.files.length === 0) {
                alert("Vui lòng tải lên ít nhất 1 Ảnh/Video hoặc Nhạc của bạn để xem trước!");
                return;
            }

            const btn = document.getElementById('render-btn');
            const progressArea = document.getElementById('progress-area');
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');
            const percentText = document.getElementById('percent-text');
            const previewSection = document.getElementById('preview-section');

            previewSection.style.display = 'none';
            previewSection.style.opacity = '0';
            btn.disabled = true;
            btn.textContent = "Đang xử lý...";
            progressArea.style.display = 'block';

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 4;
                if (progress > 100) progress = 100;
                progressBar.style.width = progress + '%';
                percentText.textContent = Math.round(progress) + '%';

                if (progress === 100) {
                    clearInterval(interval);
                    statusText.textContent = "Xử lý thành công!";
                    statusText.style.color = "var(--success-color)";
                    
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.textContent = "Cập Nhật Lại Bản Dựng";
                        progressArea.style.display = 'none';
                        progressBar.style.width = '0%';
                        progress = 0;
                        statusText.style.color = "var(--text-primary)";

                        // GỌI HÀM HIỂN THỊ FILE THẬT CỦA USER
                        buildRealPreview();

                        previewSection.style.display = 'block';
                        setTimeout(() => previewSection.style.opacity = '1', 50);
                    }, 800);
                }
            }, 80);
        }

        // LÕI JAVASCRIPT ĐỌC FILE TỪ ĐIỆN THOẠI
        function buildRealPreview() {
            const mediaFiles = document.getElementById('media-input').files;
            const audioFiles = document.getElementById('audio-input').files;
            const playerContainer = document.getElementById('dynamic-player');
            
            playerContainer.innerHTML = ''; // Xoá trắng khung

            // 1. Hiển thị Ảnh hoặc Video đầu tiên mà bạn tải lên
            if (mediaFiles.length > 0) {
                const file = mediaFiles[0];
                const fileURL = URL.createObjectURL(file); // Tạo link cục bộ trên iOS

                if (file.type.startsWith('video/')) {
                    const videoTag = document.createElement('video');
                    videoTag.src = fileURL;
                    videoTag.controls = true;
                    videoTag.playsInline = true;
                    videoTag.autoplay = true;
                    videoTag.muted = true; // Mute video gốc để ưu tiên nhạc nền
                    playerContainer.appendChild(videoTag);
                } else if (file.type.startsWith('image/')) {
                    const imgTag = document.createElement('img');
                    imgTag.src = fileURL;
                    playerContainer.appendChild(imgTag);
                }
            } else {
                const emptyMsg = document.createElement('p');
                emptyMsg.style.padding = '2rem';
                emptyMsg.style.color = 'var(--text-secondary)';
                emptyMsg.style.textAlign = 'center';
                emptyMsg.innerText = "Chưa có hình ảnh/video đầu vào.";
                playerContainer.appendChild(emptyMsg);
            }

            // 2. Chèn Nhạc đích mà bạn vừa tải lên
            if (audioFiles.length > 0) {
                const audioFile = audioFiles[0];
                const audioURL = URL.createObjectURL(audioFile);
                
                const audioContainer = document.createElement('div');
                audioContainer.className = 'custom-audio-player';
                
                const audioTag = document.createElement('audio');
                audioTag.src = audioURL;
                audioTag.controls = true;
                audioTag.style.width = '100%';
                
                audioContainer.appendChild(audioTag);
                playerContainer.appendChild(audioContainer);

                // Thử tự động phát nhạc (iOS có thể chặn nếu chưa tương tác màn hình)
                audioTag.play().catch(e => console.log("Cần người dùng chạm để phát nhạc trên iOS"));
            }
        }

        function downloadVideo() {
            const btn = document.querySelector('.btn-download');
            btn.innerHTML = "✅ Tệp đã được lưu vào Tệp/Ảnh trên iOS";
            setTimeout(() => btn.innerHTML = "⬇ Lưu Video Về Máy", 3000);
            alert("Trên giao diện Web iOS, bạn có thể nhấn giữ vào Ảnh/Video ở trên để lưu trực tiếp vào thư viện Ảnh.");
        }
    </script>
</body>
</html>
